<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쑥쑥 성구 암송 관리자용</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme-1: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            --theme-2: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --theme-3: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            --theme-4: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        body {
            font-family: 'Nanum Gothic', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        /* 컨트롤 패널 */
        .top-nav {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 10px;
        }

        .search-box {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        /* 가로형 카드 디자인 */
        .card {
            width: 100%;
            max-width: 650px;
            height: 350px;
            border-radius: 25px;
            position: relative;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: 0.5s ease;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            color: #333;
            overflow: hidden;
        }

        .week-badge {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(255,255,255,0.8);
            padding: 5px 15px;
            border-radius: 50px;
            font-family: 'Gaegu';
            font-size: 1.2rem;
            font-weight: bold;
        }

        .version-badge {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(0,0,0,0.1);
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .verse-content {
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.6;
            margin-bottom: 20px;
            word-break: keep-all;
            text-align: center;
        }

        .verse-ref {
            font-size: 1.1rem;
            text-align: center;
            opacity: 0.8;
        }

        /* 하단 메뉴 */
        .bottom-menu {
            margin-top: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .theme-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .theme-dot {
            width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid white;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-main { background: #333; color: white; }
        .btn-admin { background: #ff8b94; color: white; }

        /* 관리자 모달 */
        #admin-panel {
            display: none;
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            z-index: 100; width: 90%; max-width: 400px;
        }

        #admin-panel input, #admin-panel textarea {
            width: 100%; margin-bottom: 10px; padding: 10px; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="top-nav">
    <input type="number" id="searchWeek" class="search-box" placeholder="주차 검색 (예: 1)">
    <button class="btn-main" onclick="searchVerse()">이동</button>
</div>

<div class="theme-selector">
    <div class="theme-dot" style="background: var(--theme-1)" onclick="changeTheme(1)"></div>
    <div class="theme-dot" style="background: var(--theme-2)" onclick="changeTheme(2)"></div>
    <div class="theme-dot" style="background: var(--theme-3)" onclick="changeTheme(3)"></div>
    <div class="theme-dot" style="background: var(--theme-4)" onclick="changeTheme(4)"></div>
</div>

<div class="card" id="card-kor" style="background: var(--theme-1); margin-bottom: 20px;">
    <div class="week-badge" id="display-week-kor">WEEK 1</div>
    <div class="version-badge">개역한글</div>
    <div class="verse-content" id="text-kor">여호와는 나의 목자시니 내게 부족함이 없으리로다</div>
    <div class="verse-ref" id="ref-kor">시편 23:1</div>
</div>

<div class="card" id="card-eng" style="background: var(--theme-1)">
    <div class="week-badge" id="display-week-eng">WEEK 1</div>
    <div class="version-badge">ESV</div>
    <div class="verse-content" id="text-eng">The LORD is my shepherd; I shall not want.</div>
    <div class="verse-ref" id="ref-eng">Psalm 23:1</div>
</div>

<div class="bottom-menu">
    <button class="btn-main" onclick="moveWeek(-1)">이전 주차</button>
    <button class="btn-main" onclick="moveWeek(1)">다음 주차</button>
    <button class="btn-admin" onclick="openAdmin()">성구 추가 (관리자)</button>
</div>

<div id="admin-panel">
    <h3>새로운 성구 추가 ✍️</h3>
    <input type="number" id="new-week" placeholder="주차 (숫자)">
    <textarea id="new-kor" placeholder="한글 성구 내용"></textarea>
    <input type="text" id="new-kor-ref" placeholder="한글 성구 장절 (예: 시편 23:1)">
    <hr>
    <textarea id="new-eng" placeholder="English Verse"></textarea>
    <input type="text" id="new-eng-ref" placeholder="English Reference">
    <button class="btn-main" onclick="addNewVerse()">저장하기</button>
    <button onclick="document.getElementById('admin-panel').style.display='none'">닫기</button>
</div>

<script>
    // 초기 기본 데이터
    const defaultData = [
        { week: 1, kor: "여호와는 나의 목자시니 내게 부족함이 없으리로다", korRef: "시편 23:1", eng: "The LORD is my shepherd; I shall not want.", engRef: "Psalm 23:1" }
    ];

    let bibleVerses = JSON.parse(localStorage.getItem('bibleVerses')) || defaultData;
    let currentIndex = 0;

    function render() {
        const v = bibleVerses[currentIndex];
        if(!v) return;

        document.getElementById('display-week-kor').innerText = `WEEK ${v.week}`;
        document.getElementById('display-week-eng').innerText = `WEEK ${v.week}`;
        document.getElementById('text-kor').innerText = v.kor;
        document.getElementById('ref-kor').innerText = v.korRef;
        document.getElementById('text-eng').innerText = v.eng;
        document.getElementById('ref-eng').innerText = v.engRef;
    }

    function moveWeek(dir) {
        currentIndex += dir;
        if(currentIndex < 0) currentIndex = 0;
        if(currentIndex >= bibleVerses.length) currentIndex = bibleVerses.length - 1;
        render();
    }

    function searchVerse() {
        const sw = document.getElementById('searchWeek').value;
        const index = bibleVerses.findIndex(i => i.week == sw);
        if(index !== -1) {
            currentIndex = index;
            render();
        } else {
            alert("해당 주차의 성구가 아직 없어요!");
        }
    }

    function changeTheme(num) {
        const theme = `var(--theme-${num})`;
        document.getElementById('card-kor').style.background = theme;
        document.getElementById('card-eng').style.background = theme;
    }

    function openAdmin() {
        const pw = prompt("관리자 비밀번호를 입력하세요. (초기: 1234)");
        if(pw === "1234") {
            document.getElementById('admin-panel').style.display = 'block';
        } else {
            alert("비밀번호가 틀렸습니다.");
        }
    }

    function addNewVerse() {
        const newItem = {
            week: parseInt(document.getElementById('new-week').value),
            kor: document.getElementById('new-kor').value,
            korRef: document.getElementById('new-kor-ref').value,
            eng: document.getElementById('new-eng').value,
            engRef: document.getElementById('new-eng-ref').value
        };

        if(!newItem.week || !newItem.kor) return alert("내용을 입력해주세요.");

        bibleVerses.push(newItem);
        bibleVerses.sort((a, b) => a.week - b.week);
        localStorage.setItem('bibleVerses', JSON.stringify(bibleVerses));
        
        alert("성구가 추가되었습니다!");
        document.getElementById('admin-panel').style.display = 'none';
        location.reload();
    }

    render();
</script>

</body>
</html>
