<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쑥쑥 성구 암송 - 정자체 카드</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme-1: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            --theme-2: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --theme-3: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            --theme-4: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --current-font: 'Nanum Gothic', sans-serif;
        }

        body { font-family: 'Nanum Gothic', sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; transition: 0.3s; }
        
        /* 설정 섹션 */
        .settings-panel { width: 100%; max-width: 600px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 20px; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .theme-dot { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid #ddd; }
        select { padding: 8px; border-radius: 10px; border: 1px solid #ddd; font-family: inherit; }

        .top-nav { width: 100%; max-width: 600px; display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #ddd; }

        /* 카드 고정 크기 디자인 */
        .card { 
            width: 100%; max-width: 600px; height: 320px; /* 높이 고정 */
            border-radius: 25px; position: relative; padding: 50px 30px 30px 30px; 
            box-sizing: border-box; display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); color: #333; margin-bottom: 20px;
            overflow: hidden; font-family: var(--current-font);
        }

        .week-badge { 
            position: absolute; top: 15px; left: 15px; 
            background: rgba(255,255,255,0.9); padding: 4px 12px; 
            border-radius: 8px; font-size: 0.9rem; font-weight: bold; border: 1px solid rgba(0,0,0,0.1);
        }

        .version-badge { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.05); padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: bold; }

        /* 폰트 자동 조절을 위한 컨테이너 */
        .verse-container {
            width: 100%; height: 180px; 
            display: flex; justify-content: center; align-items: center;
            text-align: center; overflow: hidden;
        }
        
        .verse-content { 
            font-weight: 700; line-height: 1.4; word-break: keep-all; width: 100%;
            /* 기본 폰트 사이즈는 JS에서 자동 조절함 */
        }

        .verse-ref { font-size: 1.1rem; margin-top: 15px; font-weight: bold; color: #444; }

        button { padding: 12px 20px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-family: inherit; }
        .btn-main { background: #333; color: white; }
        .btn-admin { background: #ff8b94; color: white; margin-top: 10px; }
        
        #admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 25px; box-shadow: 0 0 50px rgba(0,0,0,0.3); z-index: 100; width: 90%; max-width: 450px; overflow-y: auto; max-height: 90vh; }
        #admin-panel input, #admin-panel textarea { width: 100%; margin-bottom: 10px; padding: 12px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 10px; }
    </style>
</head>
<body>

<div class="settings-panel">
    <div style="display: flex; gap: 8px; align-items: center;">
        <div class="theme-dot" style="background: var(--theme-1)" onclick="changeTheme(1)"></div>
        <div class="theme-dot" style="background: var(--theme-2)" onclick="changeTheme(2)"></div>
        <div class="theme-dot" style="background: var(--theme-3)" onclick="changeTheme(3)"></div>
        <div class="theme-dot" style="background: var(--theme-4)" onclick="changeTheme(4)"></div>
    </div>
    <select id="fontSelect" onchange="changeFont()">
        <option value="'Nanum Gothic', sans-serif">기본 정자체 (나눔고딕)</option>
        <option value="'Nanum Myeongjo', serif">단정한 명조체 (나눔명조)</option>
        <option value="'Noto Sans KR', sans-serif">깔끔한 본고딕 (Noto Sans)</option>
    </select>
</div>

<div class="top-nav">
    <input type="number" id="searchWeek" class="search-box" placeholder="주차 검색 (예: 1)">
    <button class="btn-main" onclick="searchVerse()">이동</button>
</div>

<div class="card" id="card-kor" style="background: var(--theme-1);">
    <div class="week-badge" id="display-week-kor">1주</div>
    <div class="version-badge">개역한글</div>
    <div class="verse-container">
        <div class="verse-content" id="text-kor">말씀을 등록해 주세요.</div>
    </div>
    <div class="verse-ref" id="ref-kor"></div>
</div>

<div class="card" id="card-eng" style="background: var(--theme-1)">
    <div class="week-badge" id="display-week-eng">1주</div>
    <div class="version-badge">ESV</div>
    <div class="verse-container">
        <div class="verse-content" id="text-eng">Please register a verse.</div>
    </div>
    <div class="verse-ref" id="ref-eng"></div>
</div>

<div style="display: flex; gap: 10px;">
    <button class="btn-main" onclick="moveWeek(-1)">이전 주</button>
    <button class="btn-main" onclick="moveWeek(1)">다음 주</button>
</div>
<button class="btn-admin" onclick="openAdmin()">⚙️ 성구 관리자 (수동 입력)</button>

<div id="admin-panel">
    <h3>성구 직접 등록 ✨</h3>
    <input type="number" id="new-week" placeholder="주차 (숫자)">
    <label>한글 성구</label>
    <textarea id="new-kor" rows="3" placeholder="한글 본문을 직접 입력하세요"></textarea>
    <input type="text" id="new-kor-ref" placeholder="장절 (예: 시편 23:1)">
    <label>영문 성구</label>
    <textarea id="new-eng" rows="3" placeholder="English verse here"></textarea>
    <input type="text" id="new-eng-ref" placeholder="English Ref (예: Psalm 23:1)">
    
    <button class="btn-main" style="width: 100%; background: #ff8b94;" onclick="addNewVerse()">저장하기</button>
    <button style="width: 100%; margin-top: 10px; background: #eee;" onclick="document.getElementById('admin-panel').style.display='none'">닫기</button>
</div>

<script>
    let bibleVerses = JSON.parse(localStorage.getItem('bibleVerses')) || [
        { week: 1, kor: "여호와는 나의 목자시니 내게 부족함이 없으리로다", korRef: "시편 23:1", eng: "The LORD is my shepherd; I shall not want.", engRef: "Psalm 23:1" }
    ];
    let currentIndex = 0;

    // 폰트 크기 자동 조절 함수
    function adjustFontSize() {
        const containers = document.querySelectorAll('.verse-container');
        containers.forEach(container => {
            const textElement = container.querySelector('.verse-content');
            let fontSize = 2.0; // 시작 폰트 사이즈 (rem)
            textElement.style.fontSize = fontSize + "rem";

            // 텍스트가 컨테이너 높이를 넘어가면 사이즈를 줄임
            while (textElement.scrollHeight > container.offsetHeight && fontSize > 0.8) {
                fontSize -= 0.1;
                textElement.style.fontSize = fontSize + "rem";
            }
        });
    }

    function render() {
        const v = bibleVerses[currentIndex];
        document.getElementById('display-week-kor').innerText = `${v.week}주`;
        document.getElementById('display-week-eng').innerText = `${v.week}주`;
        document.getElementById('text-kor').innerText = v.kor;
        document.getElementById('ref-kor').innerText = v.korRef;
        document.getElementById('text-eng').innerText = v.eng;
        document.getElementById('ref-eng').innerText = v.engRef;
        
        // 렌더링 직후 폰트 크기 조정
        setTimeout(adjustFontSize, 10);
    }

    function addNewVerse() {
        const newItem = {
            week: parseInt(document.getElementById('new-week').value),
            kor: document.getElementById('new-kor').value,
            korRef: document.getElementById('new-kor-ref').value,
            eng: document.getElementById('new-eng').value,
            engRef: document.getElementById('new-eng-ref').value
        };
        if(!newItem.week || !newItem.kor) return alert("데이터를 입력해 주세요.");
        bibleVerses.push(newItem);
        bibleVerses.sort((a,b) => a.week - b.week);
        localStorage.setItem('bibleVerses', JSON.stringify(bibleVerses));
        alert("저장되었습니다!");
        location.reload();
    }

    function changeFont() {
        const selectedFont = document.getElementById('fontSelect').value;
        document.body.style.setProperty('--current-font', selectedFont);
        adjustFontSize();
    }

    function changeTheme(n) {
        document.getElementById('card-kor').style.background = `var(--theme-${n})`;
        document.getElementById('card-eng').style.background = `var(--theme-${n})`;
    }

    function moveWeek(dir) {
        currentIndex = Math.max(0, Math.min(bibleVerses.length - 1, currentIndex + dir));
        render();
    }

    function searchVerse() {
        const sw = document.getElementById('searchWeek').value;
        const idx = bibleVerses.findIndex(i => i.week == sw);
        if(idx !== -1) { currentIndex = idx; render(); }
        else alert("해당 주차를 찾을 수 없습니다.");
    }

    function openAdmin() {
        if(prompt("관리자 암호") === "1234") document.getElementById('admin-panel').style.display='block';
    }

    // 초기 실행
    window.onload = render;
    window.onresize = adjustFontSize;
</script>
</body>
</html>
